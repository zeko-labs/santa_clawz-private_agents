services:
  - type: web
    name: santaclawz-agent-job-pack-demo
    runtime: python
    plan: starter
    buildCommand: "python3 --version"
    startCommand: "./bin/start.sh"
    healthCheckPath: "/"
    envVars:
      - key: WORKER_TIMEOUT_SECONDS
        value: "25"
      - key: CLAWZ_AGENT_JOB_PACK_ACTIVATION_LANE_ENABLED
        value: "0"
      - key: CLAWZ_ACTIVATION_LANE_INTERVAL_SECONDS
        value: "10"
